<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeedRapNlghtnment</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffffff,#dcdcdc,#f2f2f2);
}

.container{
  width:100%;
  max-width:420px;
  text-align:center;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:40px 20px 30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  position:relative;
}

.profile-img{
  position:absolute;
  top:-90px;
  left:50%;
  transform:translateX(-50%);
  width:190px;
  height:190px;
  border-radius:20px;
  object-fit:cover;
  border:5px solid white;
}

h1{
  margin-top:120px;
  font-size:24px;
}

p{
  margin:10px 0 20px;
  color:#555;
  cursor:pointer;
}

.live{
  color:green;
  font-weight:bold;
  text-decoration:underline;
}

.primary-btn, .secondary-btn{
  display:block;
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  font-size:16px;
  text-decoration:none;
}

.primary-btn{
  background:black;
  color:white;
}

.secondary-btn{
  background:#E1306C;
  color:white;
}

.countdown{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  z-index:999;
  display:none;
}

.email-popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.email-box{
  background:white;
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
  animation:fadeIn 0.4s ease;
}

.email-box input{
  width:100%;
  padding:12px;
  margin:15px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

.email-box button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:black;
  color:white;
}

.skip{
  display:block;
  margin-top:10px;
  font-size:12px;
  color:#888;
  cursor:pointer;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.9);}
  to{opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<div class="email-popup" id="emailPopup">
  <div class="email-box">
    <h2>Join the Movement</h2>
    <p>Stay updated with new drops & live shows.</p>

    <form id="emailForm">
      <input type="email" id="emailInput" required placeholder="Enter your email">
      <button type="submit">Join</button>
    </form>

    <span class="skip" id="skipPopup">No thanks</span>
  </div>
</div>

<div class="countdown" id="countdown">30</div>

<div class="container">

  <img class="profile-img"
  src="https://miro.medium.com/v2/resize:fit:1400/format:webp/1*Ln-zDn6chTqMCMzx1GeUCQ.png">

  <h1>WeedRapNlghtnment</h1>

  <p id="scheduleText">Loading schedule...</p>

  <a href="https://cash.app/$WeedRapNLghtnMent" target="_blank" class="primary-btn">
    Cash App
  </a>

  <a href="https://www.instagram.com/weedrapnlghtnment/" target="_blank" class="secondary-btn">
    Instagram
  </a>

</div>

<script>
// 🔥 YOUR REAL LOCATION LINK
const locationLink = "https://maps.app.goo.gl/bXSerAQgZVYDSPj68";

const schedule = {
  0: null,
  1: ["18:00","22:00"],
  2: ["18:00","22:00"],
  3: ["18:00","22:00"],
  4: ["18:00","22:00"],
  5: ["18:00","23:30"],
  6: ["18:00","23:30"]
};

const text = document.getElementById("scheduleText");
const countdownEl = document.getElementById("countdown");

function formatTime(time){
  let [h,m] = time.split(":");
  h = parseInt(h);
  let ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${m} ${ampm}`;
}

function checkLive(){
  const now = new Date();
  const today = schedule[now.getDay()];

  if(!today){
    text.innerText = "Closed Today";
    return;
  }

  const [start,end] = today;
  const current = now.getHours()*60 + now.getMinutes();
  const startMin = parseInt(start)*60 + parseInt(start.split(":")[1]);
  const endMin = parseInt(end)*60 + parseInt(end.split(":")[1]);

  if(current >= startMin && current <= endMin){
    text.innerText = "🔴 LIVE NOW – Tap for location";
    text.classList.add("live");
    text.onclick = startCountdown;
  } else {
    text.classList.remove("live");
    text.innerText = `Next Show: ${formatTime(start)} - ${formatTime(end)}`;
    text.onclick = null;
  }
}

function startCountdown(){
  let count = 30;
  countdownEl.style.display = "flex";
  countdownEl.innerText = count;

  const interval = setInterval(()=>{
    count--;
    countdownEl.innerText = count;

    if(count <= 0){
      clearInterval(interval);
      window.open(locationLink, "_blank");
      countdownEl.style.display = "none";
    }
  },1000);
}

// POPUP CONTROL
const popup = document.getElementById("emailPopup");

popup.style.display = "none";

setTimeout(()=>{
  if(!localStorage.getItem("closed")){
    popup.style.display = "flex";
  }
},2000);

document.getElementById("skipPopup").onclick = ()=>{
  popup.style.display = "none";
  localStorage.setItem("closed","true");
};

document.getElementById("emailForm").onsubmit = (e)=>{
  e.preventDefault();
  alert("You're in.");
  popup.style.display = "none";
  localStorage.setItem("closed","true");
};

// INIT
checkLive();
setInterval(checkLive,60000);
</script>

</body>
</html>
